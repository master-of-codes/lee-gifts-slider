<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- PWA Metadata -->
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Milestone slider">
  <title>3D Slider</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" id="dynamic-manifest">
  
  <!-- iOS Icons -->
  <link rel="apple-touch-icon" href="./assets/1m.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="3D Slider">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/1m.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      touch-action: none;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      display: flex;
      background: #111;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    /* Install Logo Button */
    .pwa-logo {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 15px aqua;
      transition: all 0.3s ease;
      border: 2px solid white;
      object-fit: cover;
    }

    .pwa-logo:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px aqua;
    }

    /* Install Dialog */
    .pwa-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .pwa-dialog-content {
      background: linear-gradient(135deg, rgba(20, 20, 20, 0.95), rgba(40, 40, 40, 0.95));
      border: 2px solid aqua;
      border-radius: 15px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 15px 40px aqua;
      animation: dialogAppear 0.5s ease-out;
    }

    @keyframes dialogAppear {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pwa-dialog h3 {
      color: aqua;
      margin-bottom: 15px;
      font-size: 1.8rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .pwa-dialog p {
      margin-bottom: 20px;
      line-height: 1.6;
      color: #fff;
      font-size: 1rem;
    }

    .app-icon-preview {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid aqua;
      box-shadow: 0 4px 15px aqua;
    }

    .app-icon-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .pwa-dialog-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .pwa-dialog-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      min-width: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .install-btn {
      background: linear-gradient(135deg, aqua);
      color: #fff;
    }

    .install-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px aqua;
    }

    .cancel-btn {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
    }

    .cancel-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, aqua, aqua);
      color: white;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      z-index: 1001;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    /* Image Modal */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .image-modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      background: transparent;
      border-radius: 10px;
      text-align: center;
    }

    .image-modal-content img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
    }

    .close-modal:hover {
      color: aqua;
    }

    .download-section {
      margin-top: 20px;
    }

    .download-btn {
      background: linear-gradient(135deg, aqua, aqua);
      color: #000;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px aqua;
    }

    .download-btn svg {
      stroke: #000;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Original 3D Carousel Styles */
    #drag-container, #spin-container {
      position: relative;
      display: flex;
      margin: auto;
      transform-style: preserve-3d;
      transform: rotateX(-10deg);
    }

    #drag-container img, #drag-container video {
      transform-style: preserve-3d;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      line-height: 200px;
      font-size: 50px;
      text-align: center;
      box-shadow: 0 0 8px #fff;
      -webkit-box-reflect: below 10px linear-gradient(transparent, transparent, #0005);
    }

    #drag-container img:hover, #drag-container video:hover {
      box-shadow: 0 0 15px #fffd;
      -webkit-box-reflect: below 10px linear-gradient(transparent, transparent, #0007);
    }

    #drag-container p {
      font-family: serif;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(90deg);
      color: #fff;
      font-size: 100px;
    }

    @media (max-width: 768px) {
      #drag-container p {
        font-size: 50px;
      }
    }

    #ground {
      width: 900px;
      height: 900px;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(90deg);
      background: radial-gradient(center center, farthest-side, #9993, transparent);
    }

    @keyframes spin {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    @keyframes spinRevert {
      from {
        transform: rotateY(360deg);
      }
      to {
        transform: rotateY(0deg);
      }
    }
  </style>
</head>
<body>
  <!-- PWA Logo in top-left corner -->
  <img class="pwa-logo" id="installLogo" src="./assets/1m.png" alt="Install  App">

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Install Dialog -->
  <div class="pwa-dialog" id="pwaDialog">
    <div class="pwa-dialog-content">
      <h3>Install Milestone App</h3>
      <p>Install this app on your device for a better experience.</p>
      <div class="app-icon-preview">
        <img src="./assets/1m.png" alt="App Icon">
      </div>
      <div class="pwa-dialog-buttons">
        <button class="pwa-dialog-btn install-btn" id="installButton">Install</button>
        <button class="pwa-dialog-btn cancel-btn" id="cancelButton">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Image Popup Modal -->
  <div class="image-modal" id="imageModal">
    <div class="image-modal-content">
      <span class="close-modal" id="closeModal">&times;</span>
      <img id="modalImage" src="" alt="Enlarged Image">
      <div class="download-section">
        <button class="download-btn" id="downloadBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download
        </button>
      </div>
    </div>
  </div>

  <!-- Original 3D Carousel Structure -->
  <div id="drag-container">
    <div id="spin-container">
      <img src="./assets/1m.png" alt="1m">
      <img src="./assets/2m.png" alt="2m">
      <img src="./assets/3m.png" alt="3m">
      <img src="./assets/4m.png" alt="4m">
      <img src="./assets/5m.png" alt="5m">
      <img src="./assets/6m.png" alt="6m">
      <img src="./assets/7m.png" alt="7m">
      <img src="./assets/8m.png" alt="8m">
      <img src="./assets/9m.png" alt="9m">
      <img src="./assets/10m.png" alt="10m">
      <img src="./assets/11m.png" alt="11m">
      <img src="./assets/12m.png" alt="12m">
      
      
      <p style="text-align: center;">Lee Gifts And Letters</p>
    </div>
    <div id="ground"></div>
  </div>

  <script>
    // 3D Carousel Configuration
    var radius = 300;
    var autoRotate = true;
    var rotateSpeed = -60;
    var imgWidth = 120;
    var imgHeight = 170;
    var minGap = 10;

    // Initialize 3D Carousel
    setTimeout(init, 1000);

    var odrag = document.getElementById('drag-container');
    var ospin = document.getElementById('spin-container');
    var aImg = ospin.getElementsByTagName('img');
    var aVid = ospin.getElementsByTagName('video');
    var aEle = [...aImg, ...aVid];

    // Calculate minimum radius
    var minRadius = Math.ceil((imgWidth + minGap) / (2 * Math.sin(Math.PI / aEle.length)));
    radius = Math.max(radius, minRadius);

    // Set sizes
    ospin.style.width = imgWidth + "px";
    ospin.style.height = imgHeight + "px";

    var ground = document.getElementById('ground');
    ground.style.width = radius * 3 + "px";
    ground.style.height = radius * 3 + "px";

    function init(delayTime) {
      for (var i = 0; i < aEle.length; i++) {
        aEle[i].style.transform = "rotateY(" + (i * (360 / aEle.length)) + "deg) translateZ(" + radius + "px)";
        aEle[i].style.transition = "transform 1s";
        aEle[i].style.transitionDelay = delayTime || (aEle.length - i) / 4 + "s";
      }
    }

    function applyTranform(obj) {
      if(tY > 180) tY = 180;
      if(tY < 0) tY = 0;
      obj.style.transform = "rotateX(" + (-tY) + "deg) rotateY(" + (tX) + "deg)";
    }

    function playSpin(yes) {
      ospin.style.animationPlayState = (yes?'running':'paused');
    }

    var sX, sY, nX, nY, desX = 0,
        desY = 0,
        tX = 0,
        tY = 10;

    // Auto rotate
    if (autoRotate) {
      var animationName = (rotateSpeed > 0 ? 'spin' : 'spinRevert');
      ospin.style.animation = `${animationName} ${Math.abs(rotateSpeed)}s infinite linear`;
    }

    // Drag controls
    document.onpointerdown = function (e) {
      clearInterval(odrag.timer);
      e = e || window.event;
      var sX = e.clientX,
          sY = e.clientY;

      this.onpointermove = function (e) {
        e = e || window.event;
        var nX = e.clientX,
            nY = e.clientY;
        desX = nX - sX;
        desY = nY - sY;
        tX += desX * 0.1;
        tY += desY * 0.1;
        applyTranform(odrag);
        sX = nX;
        sY = nY;
      };

      this.onpointerup = function (e) {
        odrag.timer = setInterval(function () {
          desX *= 0.95;
          desY *= 0.95;
          tX += desX * 0.1;
          tY += desY * 0.1;
          applyTranform(odrag);
          playSpin(false);
          if (Math.abs(desX) < 0.5 && Math.abs(desY) < 0.5) {
            clearInterval(odrag.timer);
            playSpin(true);
          }
        }, 17);
        this.onpointermove = this.onpointerup = null;
      };

      return false;
    };

    // Zoom with mouse wheel
    document.onmousewheel = function(e) {
      e = e || window.event;
      var d = e.wheelDelta / 20 || -e.detail;
      radius += d;
      init(1);
    };
  </script>

  <!-- PWA Installation Script -->
  <script>
    // Manifest content (created inline since we can't create separate files)
    const manifest = {
      "name": "Lee G ifts And Letters",
      "short_name": "Lee Gifts And Letters",
      "description": "3D Slider",
      "start_url": "./",
      "display": "standalone",
      "background_color": "#0a0a0a",
      "theme_color": "#0a0a0a",
      "orientation": "portrait",
      "icons": [
        {
          "src": "./assets/1m.png",
          "sizes": "192x192",
          "type": "image/png",
          "purpose": "any maskable"
        },
        {
          "src": "./assets/1m.png",
          "sizes": "512x512",
          "type": "image/png",
          "purpose": "any maskable"
        }
      ],
      "categories": ["lifestyle", "events"],
      "prefer_related_applications": false
    };

    // Create manifest dynamically
    function createManifest() {
      const manifestElement = document.getElementById('dynamic-manifest');
      if (manifestElement) {
        const blob = new Blob([JSON.stringify(manifest, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        manifestElement.href = url;
      }
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swContent = `
          const CACHE_NAME = '3d-carousel-pwa-v1';
          const urlsToCache = [
            './',
            './index.html',
            './assets/1m.png',
            './assets/img1.jpg',
            './assets/img2.jpg',
            './assets/img3.jpg',
            './assets/img4.jpg',
            './assets/img5.jpg',
            './assets/img6.jpg',
            './assets/img7.png',
            './assets/img8.png',
            './assets/img9.jpg',
            './assets/img10.jpg'
          ];

          self.addEventListener('install', event => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then(cache => {
                  return cache.addAll(urlsToCache);
                })
            );
          });

          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request)
                .then(response => {
                  if (response) {
                    return response;
                  }
                  return fetch(event.request);
                })
            );
          });

          self.addEventListener('activate', event => {
            const cacheWhitelist = [CACHE_NAME];
            event.waitUntil(
              caches.keys().then(cacheNames => {
                return Promise.all(
                  cacheNames.map(cacheName => {
                    if (cacheWhitelist.indexOf(cacheName) === -1) {
                      return caches.delete(cacheName);
                    }
                  })
                );
              })
            );
          });
        `;

        const blob = new Blob([swContent], {type: 'application/javascript'});
        const swBlobUrl = URL.createObjectURL(blob);

        navigator.serviceWorker.register(swBlobUrl)
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }

    // PWA Installation Logic
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Install dialog functionality
    document.addEventListener('DOMContentLoaded', function() {
      createManifest();

      const pwaDialog = document.getElementById('pwaDialog');
      const installButton = document.getElementById('installButton');
      const cancelButton = document.getElementById('cancelButton');
      const installLogo = document.getElementById('installLogo');
      let clickCount = 0;
      let clickTimer;

      // Double click on logo to show install dialog
      installLogo.addEventListener('click', function() {
        clickCount++;

        if (clickCount === 1) {
          clickTimer = setTimeout(() => {
            clickCount = 0;
          }, 300);
        } else if (clickCount === 2) {
          clearTimeout(clickTimer);
          showInstallDialog();
          clickCount = 0;
        }
      });

      // Show install dialog
      function showInstallDialog() {
        pwaDialog.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }

      // Hide install dialog
      function hideInstallDialog() {
        pwaDialog.style.display = 'none';
        document.body.style.overflow = 'auto';
      }

      // Install button click
      installButton.addEventListener('click', async () => {
        hideInstallDialog();

        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;

          if (outcome === 'accepted') {
            console.log('User accepted the install prompt');

            // Show success message
            showToast('🎉 3D Carousel app is being installed on your device!');
          } else {
            showToast('Installation was cancelled');
          }
          deferredPrompt = null;
        } else {
          // Fallback for browsers that don't support beforeinstallprompt
          showToast('To install this app, look for the "Add to Home Screen" option in your browser menu.');
        }
      });

      // Cancel button click
      cancelButton.addEventListener('click', hideInstallDialog);

      // Close dialog when clicking outside
      pwaDialog.addEventListener('click', (e) => {
        if (e.target === pwaDialog) {
          hideInstallDialog();
        }
      });

      // Show toast notification
      function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.display = 'block';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 3000);
      }
    });

    // Check if running as PWA
    if (window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone === true) {
      console.log('Running as PWA');
      document.getElementById('installLogo').style.display = 'none';
    }
  </script>
</body>
</html>
